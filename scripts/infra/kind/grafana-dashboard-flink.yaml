    ,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\"\
    ,\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n      \
    \  },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\"\
    : {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\
    \n        },\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        }\n\
    \      },\n      \"targets\": [\n        {\n          \"expr\": \"count(flink_taskmanager_job_task_operator_numRecordsIn)\"\
    ,\n          \"legendFormat\": \"CPU cores\",\n          \"refId\"\
    : \"A\"\n        }\n      ]\n    },\n    {\n      \"id\": 4,\n      \"title\"\
    : \"TaskManager Containers\",\n      \"type\": \"timeseries\",\n      \"gridPos\"\
    : {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\"\
    : 16\n      },\n      \"datasource\": \"Prometheus\",\n      \"fieldConfig\":\
    \ {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"decimals\"\
    : 0,\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n   \
    \     },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"\
    legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"\
    bottom\"\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\"\n\
    \        }\n      },\n      \"targets\": [\n        {\n          \"expr\": \"\
    count(kube_pod_info{namespace=\\\"default\\\", pod=~\\\"flink-taskmanager.*\\\"\
    })\",\n          \"legendFormat\": \"TaskManagers\",\n          \"refId\": \"\
    A\"\n        }\n      ]\n    },\n    {\n      \"id\": 5,\n      \"title\": \"\
