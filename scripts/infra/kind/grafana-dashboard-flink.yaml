    \  \"graphTooltip\": 1,\n  \"refresh\": \"30s\",\n  \"time\": {\n    \"from\"\
    : \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"timezone\"\
    : \"browser\",\n  \"schemaVersion\": 27,\n  \"panels\": [\n    {\n      \"id\"\
    : 1,\n      \"title\": \"Source Throughput (records/s)\",\n      \"type\": \"\
    timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n \
    \       \"x\": 0,\n        \"y\": 0\n      },\n      \"datasource\": \"Prometheus\"\
    ,\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"rps\"\
