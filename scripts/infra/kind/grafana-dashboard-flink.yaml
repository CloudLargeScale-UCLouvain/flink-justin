    \  },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\"\
    : {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\
    \n        },\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        }\n\
    \      },\n      \"targets\": [\n        {\n          \"expr\": \"sum(flink_taskmanager_job_task_operator_numRecordsOutPerSecond{operator_name=~\\\
