    \      },\n      \"targets\": [\n        {\n          \"expr\": \"count(flink_taskmanager_job_task_operator_numRecordsOutPerSecond)\
    \ by (operator_name)\",\n          \"legendFormat\": \"{{operator_name}}\",\n\
    \          \"refId\": \"A\"\n        }\n      ]\n    },\n    {\n      \"id\":\
